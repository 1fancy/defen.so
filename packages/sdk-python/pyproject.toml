[project]
name = "defenso"
version = "0.1.0"
description = "Defenso Python SDK — fail-open security middleware for FastAPI, Django, Flask."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Defenso", email = "info@defen.so" }]
keywords = ["security", "waf", "middleware", "fastapi", "django", "flask", "defenso"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Topic :: Security",
]
dependencies = []

[project.urls]
Homepage = "https://defen.so"
Docs = "https://defen.so/install"
Source = "https://github.com/1fancy/defenso"

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"
